<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Exam Performance Predictor</title>
</head>
<body>
    <h1>Student Exam Performance Prediction</h1>

    <form method="POST">
        <label>Gender:</label>
        <select name="gender" required>
            <option value="">Select Gender</option>
            <option value="Male">Male</option>
            <option value="Female">Female</option>
        </select><br><br>

        <label>Race or Ethnicity:</label>
        <select name="ethnicity" required>
            <option value="">Select Ethnicity</option>
            <option value="Group A">Group A</option>
            <option value="Group B">Group B</option>
            <option value="Group C">Group C</option>
            <option value="Group D">Group D</option>
            <option value="Group E">Group E</option>
        </select><br><br>

        <label>Parental Level of Education:</label>
        <select name="parent_edu" required>
            <option value="">Select Parent Education</option>
            <option value="High School">High School</option>
            <option value="Some College">Some College</option>
            <option value="Associate Degree">Associate Degree</option>
            <option value="Bachelor's Degree">Bachelor's Degree</option>
            <option value="Master's Degree">Master's Degree</option>
        </select><br><br>

        <label>Lunch Type:</label>
        <select name="lunch" required>
            <option value="">Select Lunch Type</option>
            <option value="Standard">Standard</option>
            <option value="Free/Reduced">Free/Reduced</option>
        </select><br><br>

        <label>Test Preparation Course:</label>
        <select name="test_course" required>
            <option value="">Select Test Course</option>
            <option value="None">None</option>
            <option value="Completed">Completed</option>
        </select><br><br>

        <label>Writing Score out of 100:</label>
        <input type="number" name="writing_score" min="0" max="100" required><br><br>

        <label>Reading Score out of 100:</label>
        <input type="number" name="reading_score" min="0" max="100" required><br><br>

        <button type="submit">Predict</button>
    </form>

    {% if results is not none %}
        <h2>THE prediction is {{ results }}</h2>
    {% endif %}
</body>
</html>
